<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Une question ❤️</title>
<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
color:white;
}
.card{
background:rgba(255,255,255,.15);
padding:40px;
border-radius:20px;
backdrop-filter:blur(8px);
}
button{
padding:15px 30px;
font-size:20px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}
#yes{background:#4CAF50;color:white;}
#no{background:#ff4d4d;color:white;position:relative;}
</style>
</head>
<body>

<div class="card">
<h1>💖 Une question pour toi 💖</h1>

<p>Fatima,</p>

<p>Tu rends mes journées plus belles, et j'aimerais écrire la suite de cette histoire avec toi.</p>

<h2>Est-ce que tu veux sortir avec moi ? ❤️</h2>

<button id="yes" onclick="yes()">Oui ❤️</button>
<button id="no" onmouseover="move()">Non 🙈</button>

</div>

<script>
function yes(){
document.body.innerHTML="<h1 style='font-family:Arial;color:white;'>🥹❤️ Tu viens de faire de moi le plus heureux. J'ai hâte de vivre cette aventure avec toi. ❤️</h1>";
}

function move(){
const b=document.getElementById("no");
b.style.left=(Math.random()*300-150)+"px";
b.style.top=(Math.random()*150-75)+"px";
}
</script>

</body>
</html>
